# QA Analytics — GitHub Actions Integration
# Drop this into .github/workflows/ in your main repo.
# Runs smoke tests, ingests results, and checks the release gate.

name: QA Pipeline + Release Gate

on:
  push:
    branches: [main, 'release/**']
  pull_request:

env:
  QA_API_URL: ${{ secrets.QA_ANALYTICS_URL != '' && secrets.QA_ANALYTICS_URL || 'http://localhost:4000' }}
  QA_SUITE:   migration-ui

jobs:
  # ── Job 1: Smoke tests ──────────────────────────────────────────────────────
  smoke-tests:
    name: E2E Smoke (45 migrations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: automation/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: automation

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: automation

      - name: Run smoke tests
        run: npx playwright test tests/UI/migration/e2e-smoke/ --workers=2 --reporter=json
        working-directory: automation
        env:
          BASE_URL: ${{ secrets.BASE_URL }}

      - name: Ingest results to QA Analytics
        if: always()
        run: node qa-analytics/integrations/results-adapter.js
        env:
          QA_API_URL:      ${{ env.QA_API_URL }}
          QA_SUITE:        ${{ env.QA_SUITE }}
          QA_TOKEN:        ${{ secrets.QA_TOKEN }}
          BRANCH:          ${{ github.ref_name }}
          GITHUB_SHA:      ${{ github.sha }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: automation/playwright-report/

  # ── Job 2: Full E2E (Phase 1) ───────────────────────────────────────────────
  e2e-phase1:
    name: E2E Full Flow — Phase 1 (LSR)
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci
        working-directory: automation
      - run: npx playwright install --with-deps chromium
        working-directory: automation
      - name: Run Phase 1 E2E
        run: DRY_RUN=1 npx playwright test --config tests/UI/migration/e2e-full/playwright.config.js --grep "phase:1"
        working-directory: automation
        env:
          LSR_DOMAIN:   ${{ secrets.LSR_DOMAIN }}
          LSR_EMAIL:    ${{ secrets.LSR_EMAIL }}
          LSR_PASSWORD: ${{ secrets.LSR_PASSWORD }}

  # ── Job 3: Release gate ─────────────────────────────────────────────────────
  release-gate:
    name: Release Gate Check
    runs-on: ubuntu-latest
    needs: [smoke-tests]
    steps:
      - name: Check release gate
        id: gate
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${{ env.QA_API_URL }}/api/release-gate/check" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.QA_TOKEN }}" \
            -d '{
              "suiteId": "${{ env.QA_SUITE }}",
              "branch":  "${{ github.ref_name }}",
              "commit":  "${{ github.sha }}"
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          STATUS=$(echo "$BODY" | jq -r '.status')
          BLOCKERS=$(echo "$BODY" | jq -r '.blockers | join(", ")')
          echo "status=$STATUS"   >> $GITHUB_OUTPUT
          echo "blockers=$BLOCKERS" >> $GITHUB_OUTPUT
          echo "http_code=$HTTP_CODE" >> $GITHUB_OUTPUT

      - name: ✅ Gate passed
        if: steps.gate.outputs.status == 'DEPLOY_ALLOWED'
        run: echo "✅ Release gate passed — deployment allowed"

      - name: ❌ Gate blocked
        if: steps.gate.outputs.status == 'DEPLOY_BLOCKED'
        run: |
          echo "❌ Release gate BLOCKED"
          echo "Blockers: ${{ steps.gate.outputs.blockers }}"
          echo "Dashboard: ${{ env.QA_API_URL }}"
          exit 1
